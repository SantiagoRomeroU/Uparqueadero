<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Parqueadero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contenedor {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 6px;
            font-size: 24px;
        }

        .subtitulo {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .grupo {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .obligatorio { color: #dc3545; }

        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4a90d9;
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background-color: #4a90d9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-enviar:hover { background-color: #357abd; }

        .mensaje {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .exito { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }

        .nota {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Campos extra para miembros, ocultos por defecto */
        #campos-miembro { display: none; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>🅿️ Parqueadero</h1>
        <p class="subtitulo">Unimonserrate — Registro de vehículo</p>

        {% if mensaje %}
            <div class="mensaje {{ tipo_mensaje }}">{{ mensaje }}</div>
        {% endif %}

        <form method="POST" action="/registro">

            <div class="grupo">
                <label>Número de documento <span class="obligatorio">*</span></label>
                <input type="number" name="documento" placeholder="Ej: 1023456789" required>
            </div>

            <div class="grupo">
                <label>Nombre completo <span class="obligatorio">*</span></label>
                <input type="text" name="nombre" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="grupo">
                <label>Rol <span class="obligatorio">*</span></label>
                <select name="rol" required onchange="mostrarCamposMiembro(this.value)">
                    <option value="">-- Selecciona tu rol --</option>
                    <option value="Visitante">Visitante</option>
                    <option value="Estudiante">Estudiante</option>
                    <option value="Empleado">Empleado</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>

            <div class="grupo">
                <label>Tipo de vehículo <span class="obligatorio">*</span></label>
                <select name="tipo_vehiculo" required>
                    <option value="">-- Selecciona el vehículo --</option>
                    <option value="carro">🚗 Carro</option>
                    <option value="moto">🏍️ Moto</option>
                    <option value="bicicleta">🚲 Bicicleta (exento de pago)</option>
                </select>
            </div>

            <div class="grupo">
                <label>Placa <span class="obligatorio">*</span></label>
                <input type="text" name="placa" placeholder="Ej: ABC123" maxlength="10" required>
                <p class="nota">Las bicicletas pueden usar un identificador como "BICI-001"</p>
            </div>

            <!-- Campos adicionales solo para miembros de la universidad -->
            <div id="campos-miembro">
                <div class="grupo">
                    <label>Correo institucional</label>
                    <input type="email" name="correo" placeholder="Ej: juan@unimonserrate.edu.co">
                </div>
            </div>

            <button type="submit" class="btn-enviar">Registrarme</button>

        </form>
    </div>

    <script>
        function mostrarCamposMiembro(rol) {
            const campos = document.getElementById('campos-miembro');
            // Mostrar correo solo si es miembro de la universidad
            if (rol === 'Estudiante' || rol === 'Empleado' || rol === 'Administrador') {
                campos.style.display = 'block';
            } else {
                campos.style.display = 'none';
            }
        }
    </script>
</body>
</html>
